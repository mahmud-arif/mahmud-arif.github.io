<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grd" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="#080d1a"/>

  <!-- Border ring with gradient -->
  <rect x="2" y="2" width="96" height="96" rx="18"
    stroke="url(#grd)" stroke-width="2.5" stroke-opacity="0.75"/>

  <!-- > chevron -->
  <path d="M18 32 L42 50 L18 68"
    stroke="url(#grd)" stroke-width="7.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- _ underscore -->
  <line x1="52" y1="70" x2="80" y2="70"
    stroke="url(#grd)" stroke-width="7.5"
    stroke-linecap="round"
    filter="url(#glow)"/>
</svg>
